<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EDA Sync — first-run setup</title>
  <style>
    body { font: 14px/1.5 system-ui, -apple-system, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; color: #111; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .board { font: 12px/1.4 ui-monospace, SFMono-Regular, monospace; color: #555; word-break: break-all; margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin: 12px 0 4px; }
    input[type=text], input[type=password], select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font: inherit; background: #fff; }
    .hint { font-size: 12px; color: #555; margin-top: 4px; }
    .hint code { background: #f4f4f4; padding: 2px 4px; border-radius: 3px; }
    .hint.warn { color: #b45309; }
    button { margin-top: 20px; padding: 8px 16px; background: #2563eb; color: #fff; border: 0; border-radius: 4px; font: inherit; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>EDA Sync — first-run setup</h1>
  <div class="board">For: {{.BoardPath}}</div>

  <form action="/save" method="POST" id="setup-form">
    <label for="server_url">Server URL</label>
    <input type="text" id="server_url" name="server_url" value="{{.Initial.ServerURL}}" placeholder="https://co-circuit.eugenepentland.dev" required>
    <div class="hint">Press Tab after editing to refresh the design list.</div>

    <label for="design">Design</label>
    <select id="design-select" name="design" required>
      <option value="" disabled selected>Loading designs…</option>
    </select>
    <input type="text" id="design-text" name="design-text" placeholder="cyclops-breakout-board" style="display:none;" value="{{.Initial.Design}}">
    <div class="hint" id="design-hint"></div>

    <div class="hint" style="margin-top: 16px;">
      No client ID/secret needed — the agent registers itself with the
      server automatically. You'll be asked to sign in and approve on
      the next page.
    </div>

    <button type="submit" id="submit-btn">Save & continue to OAuth</button>
  </form>

  <script>
    (function () {
      const initialDesign = "{{ .Initial.Design }}";
      const serverInput = document.getElementById('server_url');
      const select = document.getElementById('design-select');
      const textInput = document.getElementById('design-text');
      const hint = document.getElementById('design-hint');

      function setHint(msg, warn) {
        hint.textContent = msg || '';
        hint.classList.toggle('warn', !!warn);
      }

      function showText(initial) {
        select.style.display = 'none';
        select.required = false;
        select.removeAttribute('name');
        textInput.style.display = '';
        textInput.required = true;
        textInput.setAttribute('name', 'design');
        if (initial) textInput.value = initial;
      }

      function showSelect(designs) {
        textInput.style.display = 'none';
        textInput.required = false;
        textInput.removeAttribute('name');
        select.style.display = '';
        select.required = true;
        select.setAttribute('name', 'design');
        select.innerHTML = '';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.disabled = true;
        placeholder.textContent = '— pick one —';
        select.appendChild(placeholder);
        let matched = false;
        for (const d of designs) {
          const opt = document.createElement('option');
          opt.value = d.name;
          opt.textContent = d.title && d.title !== d.name ? d.name + ' — ' + d.title : d.name;
          if (d.name === initialDesign) {
            opt.selected = true;
            matched = true;
          }
          select.appendChild(opt);
        }
        if (!matched) placeholder.selected = true;
      }

      async function loadDesigns() {
        const url = serverInput.value.trim().replace(/\/+$/, '');
        if (!url) {
          setHint('Enter a server URL above.', true);
          showText(initialDesign);
          return;
        }
        setHint('Loading designs from ' + url + '/api/designs …');
        try {
          const r = await fetch(url + '/api/designs', { method: 'GET' });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const designs = await r.json();
          if (!Array.isArray(designs) || designs.length === 0) {
            setHint('Server returned no designs — type the name manually.', true);
            showText(initialDesign);
            return;
          }
          showSelect(designs);
          setHint('Loaded ' + designs.length + ' design' + (designs.length === 1 ? '' : 's') + '.');
        } catch (e) {
          setHint('Could not reach ' + url + ' (' + e.message + ') — type the design name manually.', true);
          showText(initialDesign);
        }
      }

      serverInput.addEventListener('change', loadDesigns);
      serverInput.addEventListener('blur', loadDesigns);
      loadDesigns();

      // The hidden-input/select dance can leave both with `name="design"`
      // briefly during transitions. The form's submit handler force-syncs
      // exactly one of them so the server gets a single value.
      document.getElementById('setup-form').addEventListener('submit', function (e) {
        if (select.style.display !== 'none') {
          textInput.removeAttribute('name');
          select.setAttribute('name', 'design');
        } else {
          select.removeAttribute('name');
          textInput.setAttribute('name', 'design');
        }
      });
    })();
  </script>
</body>
</html>
