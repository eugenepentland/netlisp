spec_file = "SPEC.md"
max_file_lines = 10000

# Checks skipped entirely (matched by registry name). spec-drift is redundant
# with pub-api-surface (both snapshot the public API), and magic-number is
# pure noise against this codebase's SVG/geometry/electrical constants.
disabled = ["spec-drift", "magic-number"]

# Baseline mode: every check records its current violations into
# .guardian/baselines/<check>.txt on the first build and only fails
# when NEW violations are introduced. This lets us turn on Guardian's
# full ~50-check suite without a wall of pre-existing failures.
#
# Workflow:
#   - First build:    baselines are written, all checks pass.
#   - Later builds:   new violations fail; resolved violations print
#                     "M resolved вЂ” re-run with GUARDIAN_UPDATE_SNAPSHOT=1
#                     to prune".
#   - Refresh:        GUARDIAN_UPDATE_SNAPSHOT=1 zig build && git add .guardian/
#
# Baseline files are plain text and sorted, designed to diff cleanly
# in code review.
[baseline]
enabled = true

# в”Ђв”Ђ Per-check cap relaxations в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# This codebase is dominated by single-pass interpreters (eval/), AST
# walkers, geometric DRC, and SVG/HTML renderers. Several Guardian
# defaults are calibrated for typical application code and produce a
# wall of false positives against state-machine and pattern-matching
# styles. The bumps below match the precedent set by guardian-zig's
# own toml, with a per-knob justification.

# parseCheck (eval/env.zig), runDrc (drc.zig), renderHub
# (render_svg/hub.zig), evalDesignBlock, and several renderer
# entry points are single-pass interpreters/dispatchers whose data
# flow lives in one function. Splitting them adds context-passing
# noise without making the logic clearer. New consumers should keep
# the framework default 60.
[function_length]
max_lines = 200

# The evaluator's switch-on-token-tag dispatch nests inside a switch
# inside a for-loop, and the DRC's grid-clearance check uses
# nested-loop spatial scans. Both reach depth 5-6 idiomatically.
# New consumers should keep the framework default 4.
[nesting_depth]
max_depth = 6

# Cognitive complexity counts each branch + nesting level. Eval and
# render functions stitch many small branches but each is locally
# readable; refactoring fragments the readability rather than
# improving it. New consumers should keep the framework default 15.
[complexity]
max_score = 50

# Pattern-matching dispatchers (parseCheck, classifyPin, isHub) and
# resolver chains (loadPinoutMap, resolveRailVoltage) idiomatically
# emit many early returns вЂ” one per case. Refactoring to a single
# tail return adds nesting without changing behaviour. New consumers
# should keep the framework default 3.
[returns_per_fn]
max_returns = 12

# HTML / SVG / KiCad-S-expression template literals (multi-line
# `\\` block strings) and JSON-schema definitions in src/serve/
# routinely run 130-160 chars. Wrapping them across lines breaks the
# template's visual structure. The hard outliers (200+ chars in
# mcp_tools.zig and the page-render handlers) get extracted to
# module-level const blocks rather than relying on this cap.
# New consumers should keep the framework recommendation 100-120.
[line_length]
max_len = 160

# `Instance` (16 fields), `RenderCtx` (15), `Block` (14), `ViolationKind`
# (14 enum cases), `Summary` (13), `ReviewDoc` (12), `Port` (12), `Rail`
# (11), `Section` (11), `Board` (11) are domain-natural aggregates: an
# electrical instance has 16 attributes; an ERC report has 14 distinct
# kinds. Splitting them into nested sub-structs adds `inst.foo.bar`
# access noise across hundreds of call sites without making the model
# any clearer. New consumers should keep the framework default 7.
[type_size]
max_fields = 16

# Recursive AST walkers (`evalSection`, `evalSubSection`, `evalPinsForm`,
# `processPinForm`, `emitDecoupleItems`) carry collector pointers; the
# Gerber layer generators (`generateCopperLayer` at 10 params, `writeFootprint`
# at 12, `collectMergedPassive` at 12) take pre-computed scratch buffers
# alongside several formatting flags. Bundling into context structs
# would touch ~50 call sites for marginal clarity. The 12 cap is the
# current worst case; DO NOT INCREASE вЂ” ratchet downward via
# context-struct refactors instead. New consumers should keep the
# framework default 4.
[function_size]
max_params = 12

# Template-rendering modules (`render_html.zig` 22, `review_md.zig` 20,
# `review_html.zig` 17, `branch.zig` 11, `review_json.zig` 10,
# `mcp_tools.zig` 8) take `writer: anytype` on every helper вЂ” that's
# the idiomatic Zig pattern for a generic format-target. The 22 cap
# is the current worst case (render_html.zig); DO NOT INCREASE.
# Refactoring to a typed Writer interface would touch every helper
# in those modules. New consumers should keep the framework default 2.
[anytype_budget]
max_per_file = 22
