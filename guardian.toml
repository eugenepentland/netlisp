spec_file = "SPEC.md"

# Baseline mode: every check records its current violations into
# .guardian/baselines/<check>.txt on the first build and only fails
# when NEW violations are introduced. This lets us turn on Guardian's
# full ~50-check suite without a wall of pre-existing failures.
#
# Workflow:
#   - First build:    baselines are written, all checks pass.
#   - Later builds:   new violations fail; resolved violations print
#                     "M resolved — re-run with GUARDIAN_UPDATE_SNAPSHOT=1
#                     to prune".
#   - Refresh:        GUARDIAN_UPDATE_SNAPSHOT=1 zig build && git add .guardian/
#
# Baseline files are plain text and sorted, designed to diff cleanly
# in code review.
[baseline]
enabled = true
# A refresh may never grow the spec baseline (fix the debt, or remove "spec" to override).
deny_growth = ["spec", "completeness"]

# Completeness checklist (opt-in). Every SPEC.md `## ` feature section must
# ADDRESS or explicitly WAIVE all 8 scenario categories (empty inputs, large
# inputs, unauthorized access, I/O failure, concurrent access, malformed
# encoding, integer overflow, panic-free). `exempt_sections` is the visible
# TODO ledger: a section stays exempt until its bullets/waivers cover the
# categories. Baseline mode records the existing category debt and auto-prunes
# it as sections become complete; deny_growth prevents new debt after adoption.
[completeness]
enabled = true

# Mutation testing. Static checks prove tests EXIST; mutation proves they BITE.
# `zig build mutate` (fast tier) mutates only lines changed vs HEAD and never
# gates below `min_mutants`; `zig build mutate-full` samples the whole tree
# deterministically (every k-th mutant up to `max_mutants`), ratchets the kill
# score in .guardian/mutation.txt, and fails below `min_score_pct`.
#
# max_mutants sizing (measured 2026-07-08): one build+test cycle after a source
# edit is ~65s on this tree (zig build 4.6s + zig build test 60.7s). Budgeting
# the nightly full run at <=2.5h gives 9000/65 ≈ 138 mutants; clamped to the
# [30,100] range → 100. Projected full-run wall time ≈ 1.7–1.8h. This cap is
# PERMANENT: deterministic sampling must stay consistent across nightly runs,
# so changing it re-rolls which mutants are tested. Do not bump it casually.
[mutation]
# measured baseline 2026-07-08: 28%. Survivor campaign 2026-07-09 (commits
# 5cfefa6/254b685/0d5b34e/ed39d46) killed 50 of 72 sampled survivors; the
# re-measure on the shifted sample scored 32%. Floor the gate at the measured
# score and RAISE toward 80 as future survivor campaigns land — the
# mutation.txt ratchet already prevents any backsliding.
min_score_pct = 32   # fail below this kill rate (gated tiers only); raise toward 80
max_mutants   = 100  # deterministic sample cap for --full (see sizing note above)
fast_max_mutants = 8 # bounded PR/local tier; full survivors remain a nightly concern
smoke_step = "test-fast" # focused tests first; every smoke survivor still runs the full suite
timeout_secs  = 300  # baseline cap/fallback; repeated mutant timeouts are inconclusive
timeout_retry_multiplier = 2 # retry a timeout before treating it as inconclusive
retained_cache_suites = 3 # exact-digest history for branch/retry reuse
min_mutants   = 4    # below this many viable mutants: informational, not gated

# Float→int cast safety. `guard_fns` names the sanctioned narrowing wrappers
# (numeric.checkedInt validates isFinite + range in float space before the
# @intFromFloat); a cast inside such a body IS the guard, so it stops counting
# toward the snapshot budget. `require_guard` path globs additionally hard-fail
# ANY raw @intFromFloat under those dirs regardless of the budget — the strict
# gate for subsystems already fully converted (untrusted eval/import inputs).
[int_from_float]
guard_fns = ["checkedInt"]
require_guard = [
  "src/eval/",
  "src/placement/",
  "src/kicad_pcb/",
  "src/import_kicad.zig",
]
# Fuzz presence: each listed hand-rolled codec that parses untrusted input
# (MCP / HTTP / file import) must carry a `std.testing.fuzz` harness, so the
# coverage can never silently lapse. See the "Fuzzing" note in CLAUDE.md.
[fuzz_presence]
modules = [
  "src/sexpr/parser.zig",
  "src/sexpr/printer.zig",
  "src/deflate.zig",
  "src/kicad_pcb/reader.zig",
  "src/zipfile.zig",
  "src/png.zig",
]
# src/exit.zig is netlisp's designated fatal helper (like guardian's own
# src/reporter.zig): the one place a raw std.process.exit(nonzero) is allowed,
# so every CLI fatal funnels through fatal()/failure() there.
[[allow]]
check = "fatal-exit"
paths = ["src/exit.zig"]

# src/serve/templates/*.zig are build-time artifacts the third-party zt template
# compiler generates from the checked-in .zt sources (the .zig outputs are
# git-ignored and regenerated every build, banner: "Auto-generated ... do not
# edit"). zt emits a fixed prelude — a "// Auto-generated" line comment then its
# imports — as the first lines, with no hook to author a leading `//!` block, so
# a module-doc header is structurally impossible here, not merely absent. This
# documents that impossibility; it is not a way to dodge the check on hand code.
[[allow]]
check = "module-doc-header"
paths = ["src/serve/templates/"]
